name: CI/CD Pipeline - Docker Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted
#ci/cd
    steps:
      - name: Cap nhat code va restart Docker
        run: |
          cd /cicd/Hotel_Management_Website
          git pull origin main
          docker compose down
          docker compose up -d --build
          docker image prune -f 