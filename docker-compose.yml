# ============================================
# Hotel Management Website - Docker Compose
# Bao gồm: PHP/Apache + MySQL + phpMyAdmin
# ============================================

services:
  # -------------------------------------------
  # Ứng dụng PHP + Apache
  # -------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=hotel_user
      - DB_PASS=Hotel@Str0ngP@ss2024
      - DB_NAME=web_hotel_mngt
      - DB_PORT=3306
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotel_network

  # -------------------------------------------
  # MySQL 8.0 Database
  # -------------------------------------------
  db:
    image: mysql:8.0
    container_name: hotel_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: RootP@ss2024!
      MYSQL_DATABASE: web_hotel_mngt
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: Hotel@Str0ngP@ss2024
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-db:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRootP@ss2024!"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hotel_network

  # -------------------------------------------
  # phpMyAdmin - Quản lý database qua giao diện web
  # -------------------------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: hotel_phpmyadmin
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: RootP@ss2024!
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotel_network

# -------------------------------------------
# Volumes & Networks
# -------------------------------------------
volumes:
  mysql_data:
    driver: local

networks:
  hotel_network:
    driver: bridge
